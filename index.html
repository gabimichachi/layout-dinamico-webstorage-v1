<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>noticias de ia</title>
    <!-- estilos internos -->
    <link rel="stylesheet" href="styles.css">

    <script src="script.js" defer></script>

    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="">
    <!-- conexao api google fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<!-- corpo da página -->

<body class="page">
    <p class="p1">paragráfo 01</p>
    <p class="p2">paragráfo 02</p>
    <p class="p3">paragráfo 03</p>

    <!-- controles do header -->
    <header class="header">
        <h1 class="header__title">últimas noticias de ia</h1>
        <div class="header__controls">
            <label for="color-picker">cor:</label>
            <input type="color" id="color-picker" class="control-group__input">
        </div>

        <!-- grupo de controles -->
        <div class="control-group">
            <label for="font-select">fonte:</label>
            <select id="font-select" class="control-group__select">
                <option value="Roboto">roboto</option>
                <option value="Open Sans">open sans</option>
                <option value="Montserrat">montserrat</option>
            </select>
        </div>

        <div class="control-group">
            <label for="article-color-picker">cor dos artigos:</label>
            <input type="color" id="article-color-picker" class="control-group__input">


            <button id="theme-toggle" class="header__theme-toggle">
                <span class="material-icons">dark_mode</span>
            </button>
        </div>
    </header>
    <main class="main">
        <article class="news">
            <h2 class="news__title">avanços recentes em ia</h2>
            <p class="news__content">os avanços na área de inteligência artificial têm sido impressionantes nos últimos
                meses, com desenvolvimentos em aprendizado de máquina e processamento de linguagem natural.</p>
        </article>

        <main class="main">
            <article class="news">
                <h2 class="news__title"></h2>
                <p class="new__content"></p>
            </article>

            <main class="main">
                <article class="news">
                    <h2 class="news__title"></h2>
                    <p class="new__content"></p>
                </article>

                <main class="main">
                    <article class="news">
                        <h2 class="news__title"></h2>
                        <p class="new__content"></p>
                    </article>

                    <main class="main">
                        <article class="news">
                            <h2 class="news__title"></h2>
                            <p class="new__content"></p>
                        </article>


                    </main>

</body>

</html>
