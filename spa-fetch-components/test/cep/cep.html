<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch</title>

    <script src="cep.js" defer></script>
</head>
<body>
    
    <h2>Digite o cep:</h2>

    <form>
        <input type="text" id="cep" placeholder="Escreva aqui">

        <br><br>

        <button type="button" id="btnThen">Botão com then().</button>
        <button type="button" id="btnAsync">Botão com async/await</button>
    </form>

</body>

<script>
const btnThen = document.getElementById('btnThen')
const btnAsync = document.getElementById('btnAsync')
const inputCep = document.getElementById('cep')

// botao then
btnThen.addEventListener('click', () => {
    const cep = inputCep.value

    fetch(`https://viacep.com.br/ws/${cep}/json/`)
        .then(response => response.json())
        .then(dados => {
            if (dados.erro) throw new Error('CEP não encontrado')

            console.log(dados)
            alert(`Cidade: ${dados.localidade}`)
        })
        .catch(erro => console.warn(erro.message))
})

// botao async
btnAsync.addEventListener('click', async () => {
    try {
        const cep = inputCep.value

        const resposta = await fetch(`https://viacep.com.br/ws/${cep}/json/`)
        const dados = await resposta.json()

        if (dados.erro) throw new Error('CEP não encontrado')

        console.log(dados)
        alert(`Cidade: ${dados.localidade}`)

    } catch (erro) {
        console.warn(erro.message)
    }
})
</script>
</html>
